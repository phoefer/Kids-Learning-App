<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LERN-APP</title>
<style>
  :root {
    --bg: #f0f4ff;
    --card: #ffffff;
    --primary: #4361ee;
    --primary-light: #e8edff;
    --green: #2dc653;
    --green-light: #d4f5de;
    --red: #e63946;
    --red-light: #fde8ea;
    --yellow: #ffd60a;
    --yellow-light: #fff8d6;
    --orange: #ff6b35;
    --purple: #7b2d8b;
    --purple-light: #f3e8f7;
    --star: #ffd60a;
    --text: #1a1a2e;
    --text-soft: #5a5a7a;
    --radius: 20px;
    --shadow: 0 4px 20px rgba(67,97,238,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    font-size: 18px;
  }

  /* ── HEADER ─────────────────────────────────── */
  #header {
    background: var(--primary);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(67,97,238,0.3);
  }
  #header h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; }
  #star-display {
    background: var(--yellow);
    color: #1a1a2e;
    border-radius: 30px;
    padding: 6px 14px;
    font-weight: 900;
    font-size: 1rem;
    display: flex; align-items: center; gap: 6px;
  }

  /* ── MAIN MENU ──────────────────────────────── */
  #menu {
    padding: 20px 16px 40px;
    max-width: 700px;
    margin: 0 auto;
  }
  .category-title {
    font-size: 0.75rem;
    font-weight: 900;
    letter-spacing: 3px;
    color: var(--text-soft);
    margin: 28px 0 12px;
    text-transform: uppercase;
  }
  .category-title.gifted { color: var(--purple); }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  @media(min-width:500px) { .game-grid { grid-template-columns: repeat(3, 1fr); } }

  .game-btn {
    background: var(--card);
    border: 3px solid transparent;
    border-radius: var(--radius);
    padding: 18px 10px 14px;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    box-shadow: var(--shadow);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .game-btn:active { transform: scale(0.96); }
  .game-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(67,97,238,0.18); border-color: var(--primary); }
  .game-btn .icon  { font-size: 2.2rem; }
  .game-btn .label { font-size: 0.72rem; font-weight: 900; letter-spacing: 1.5px; text-align: center; color: var(--text); }
  .game-btn.gifted { border-color: var(--purple-light); }
  .game-btn.gifted:hover { border-color: var(--purple); }
  .game-btn.gifted .label { color: var(--purple); }

  /* ── BADGES ─────────────────────────────────── */
  #badges {
    margin-top: 32px;
    background: var(--yellow-light);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  #badges h3 { font-size: 0.75rem; letter-spacing: 2px; font-weight: 900; color: var(--text-soft); margin-bottom: 10px; }
  .badge-row { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
  .badge {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 3px solid #ddd;
    background: #eee;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    filter: grayscale(1);
    transition: filter .3s, border-color .3s;
  }
  .badge.earned { filter: none; border-color: var(--yellow); box-shadow: 0 0 0 3px rgba(255,214,10,0.3); }

  /* ── GAME SCREEN ────────────────────────────── */
  #game-screen {
    display: none;
    padding: 16px;
    max-width: 700px;
    margin: 0 auto;
  }

  #back-btn {
    background: none; border: none;
    font-size: 1rem; font-weight: 900; letter-spacing: 1px;
    color: var(--primary); cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    padding: 4px 0 16px;
    -webkit-tap-highlight-color: transparent;
  }

  #progress-bar-wrap {
    height: 10px; border-radius: 10px;
    background: #dde3ff;
    margin-bottom: 18px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; border-radius: 10px;
    background: var(--primary);
    transition: width .4s ease;
  }

  #question-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px 20px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }

  #q-label {
    font-size: 0.65rem; letter-spacing: 3px;
    font-weight: 900; color: var(--text-soft);
    margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;
  }

  #tts-btn {
    background: var(--primary-light);
    border: none; border-radius: 30px;
    padding: 5px 12px; cursor: pointer;
    font-size: 0.75rem; font-weight: 900;
    color: var(--primary); letter-spacing: 1px;
    display: flex; align-items: center; gap: 5px;
    transition: background .15s;
  }
  #tts-btn:hover { background: #d0d8ff; }
  #tts-btn:active { transform: scale(0.95); }

  #q-text {
    font-size: 1.5rem; font-weight: 900;
    letter-spacing: 1px;
    line-height: 1.3;
    margin-bottom: 6px;
    font-family: 'Courier New', monospace;
  }

  #q-emoji { font-size: 2.8rem; margin: 10px 0; display: block; text-align: center; }

  .answer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }

  .ans-btn {
    background: var(--primary-light);
    border: 3px solid transparent;
    border-radius: 14px;
    padding: 14px 10px;
    font-size: 1rem; font-weight: 900;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
    cursor: pointer; text-align: center;
    transition: background .15s, border-color .15s, transform .1s;
    -webkit-tap-highlight-color: transparent;
    color: var(--text);
  }
  .ans-btn:active { transform: scale(0.97); }
  .ans-btn:hover  { border-color: var(--primary); background: #d0d8ff; }
  .ans-btn.correct { background: var(--green-light); border-color: var(--green); color: var(--green); }
  .ans-btn.wrong   { background: var(--red-light); border-color: var(--red); color: var(--red); }
  .ans-btn.disabled { pointer-events: none; }

  /* gifted variant */
  .gifted-game .ans-btn { background: var(--purple-light); }
  .gifted-game .ans-btn:hover { border-color: var(--purple); background: #e8d5f0; }
  .gifted-game #progress-bar { background: var(--purple); }

  #feedback {
    min-height: 36px;
    font-size: 1.1rem; font-weight: 900; letter-spacing: 1px;
    text-align: center; padding: 8px 0;
    font-family: 'Courier New', monospace;
  }
  #feedback.ok  { color: var(--green); }
  #feedback.err { color: var(--red); }

  /* ── RESULT SCREEN ──────────────────────────── */
  #result-screen {
    display: none;
    padding: 30px 20px;
    max-width: 500px; margin: 0 auto;
    text-align: center;
  }
  #result-screen .big-emoji { font-size: 5rem; margin-bottom: 10px; }
  #result-screen h2 { font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 8px; font-family: 'Courier New', monospace; }
  #result-screen p { color: var(--text-soft); margin-bottom: 24px; font-size: 1rem; }
  .result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .result-btns button {
    padding: 14px 24px; border: none; border-radius: 14px;
    font-size: 0.9rem; font-weight: 900; letter-spacing: 1.5px;
    cursor: pointer; transition: transform .1s;
    font-family: 'Courier New', monospace;
  }
  .result-btns button:active { transform: scale(0.97); }
  #btn-again { background: var(--primary); color: #fff; }
  #btn-menu  { background: var(--yellow); color: var(--text); }

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let totalStars = 0;
let giftedCompleted = 0;
let currentGame = null;
let currentQ = 0;
let currentQuestions = [];
let sessionStars = 0;
let answered = false;

/* ══════════════════════════════════════════════
   TTS
══════════════════════════════════════════════ */
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/\n/g,' '));
  u.lang = 'de-DE';
  u.rate = 0.85;
  u.pitch = 1.1;
  speechSynthesis.speak(u);
}

function speakQuestion() {
  const q = currentQuestions[currentQ];
  speak(q.q + (q.emoji ? ' ' : ''));
}

/* ══════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════ */
function goMenu() {
  speechSynthesis.cancel && speechSynthesis.cancel();
  document.getElementById('menu').style.display = '';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  updateBadges();
}

function startGame(id) {
  currentGame = id;
  const g = GAMES[id];
  // shuffle + pick 6
  currentQuestions = [...g.questions].sort(() => Math.random() - 0.5).slice(0, 6);
  currentQ = 0;
  sessionStars = 0;
  answered = false;

  document.getElementById('menu').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';

  const gs = document.getElementById('game-screen');
  gs.style.display = '';
  gs.className = g.gifted ? 'gifted-game' : '';

  renderQuestion();
}

function restartGame() {
  startGame(currentGame);
}

/* ══════════════════════════════════════════════
   QUESTION RENDERING
══════════════════════════════════════════════ */
function renderQuestion() {
  answered = false;
  const q = currentQuestions[currentQ];
  const total = currentQuestions.length;

  document.getElementById('q-counter').textContent = `FRAGE ${currentQ + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = `${(currentQ / total) * 100}%`;
  document.getElementById('q-emoji').textContent = q.emoji || '';
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';

  const grid = document.getElementById('answer-grid');
  grid.innerHTML = '';
  const shuffled = [...q.choices].sort(() => Math.random() - 0.5);
  shuffled.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = c;
    btn.onclick = () => checkAnswer(btn, c, q.answer);
    grid.appendChild(btn);
  });
}

function checkAnswer(btn, chosen, correct) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.ans-btn');
  allBtns.forEach(b => {
    b.classList.add('disabled');
    if (b.textContent === correct) b.classList.add('correct');
  });

  const fb = document.getElementById('feedback');
  if (chosen === correct) {
    btn.classList.add('correct');
    fb.textContent = '✅ SUPER! RICHTIG!';
    fb.className = 'ok';
    speak('Super! Richtig!');
    sessionStars++;
    totalStars++;
    document.getElementById('total-stars').textContent = totalStars;
  } else {
    btn.classList.add('wrong');
    fb.textContent = `❌ FAST! RICHTIG WAR: ${correct}`;
    fb.className = 'err';
    speak('Fast! Die richtige Antwort war: ' + correct);
  }

  setTimeout(() => {
    currentQ++;
    if (currentQ < currentQuestions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 1600);
}

/* ══════════════════════════════════════════════
   RESULT
══════════════════════════════════════════════ */
function showResult() {
  const total = currentQuestions.length;
  const pct = sessionStars / total;

  if (GAMES[currentGame].gifted) giftedCompleted++;

  document.getElementById('game-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = '';

  let emoji, title, msg;
  if (pct === 1)       { emoji='🏆'; title='PERFEKT!'; msg=`ALLE ${total} FRAGEN RICHTIG! UNGLAUBLICH!`; }
  else if (pct >= 0.67){ emoji='🎉'; title='SUPER!'; msg=`${sessionStars} VON ${total} RICHTIG! TOLL GEMACHT!`; }
  else if (pct >= 0.33){ emoji='👍'; title='GUT!'; msg=`${sessionStars} VON ${total} RICHTIG! WEITER ÜBEN!`; }
  else                 { emoji='💪'; title='WEITER!'; msg=`${sessionStars} VON ${total} RICHTIG! DU SCHAFFST DAS!`; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-text').textContent = msg;

  speak(title + '! ' + msg);
  updateBadges();
}

/* ══════════════════════════════════════════════
   BADGES
══════════════════════════════════════════════ */
function updateBadges() {
  const b1 = document.getElementById('badge-1');
  const b2 = document.getElementById('badge-2');
  const b3 = document.getElementById('badge-3');
  const b4 = document.getElementById('badge-4');
  const b4g = document.getElementById('badge-4g');
  if (totalStars >= 5)  b1.classList.add('earned');
  if (totalStars >= 15) b2.classList.add('earned');
  if (totalStars >= 30) b3.classList.add('earned');
  if (totalStars >= 60) b4.classList.add('earned');
  if (giftedCompleted >= 1) b4g.classList.add('earned');
}
