<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LERN-APP</title>
<style>
:root{--bg:#f0f4ff;--card:#fff;--primary:#4361ee;--plight:#e8edff;--green:#2dc653;--glight:#d4f5de;--red:#e63946;--rlight:#fde8ea;--yellow:#ffd60a;--ylight:#fff8d6;--purple:#7b2d8b;--plightbg:#f3e8f7;--text:#1a1a2e;--soft:#5a5a7a;--r:20px;--sh:0 4px 20px rgba(67,97,238,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100vh;color:var(--text);font-size:18px}

/* HEADER */
#header{background:var(--primary);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(67,97,238,.3)}
#header h1{font-size:1.2rem;font-weight:900;letter-spacing:2px}
#header-right{display:flex;align-items:center;gap:10px}
#user-pill{background:rgba(255,255,255,.2);border-radius:30px;padding:4px 12px;font-size:.75rem;font-weight:700;cursor:pointer;letter-spacing:1px}
#star-display{background:var(--yellow);color:#1a1a2e;border-radius:30px;padding:5px 12px;font-weight:900;font-size:.9rem;display:flex;align-items:center;gap:5px}

/* LOGIN SCREEN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:24px;text-align:center}
#login-screen h2{font-size:1.6rem;font-weight:900;letter-spacing:2px;margin-bottom:8px;font-family:'Courier New',monospace}
#login-screen p{color:var(--soft);margin-bottom:28px;font-size:.95rem}
.user-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;margin-bottom:20px}
.user-btn{background:var(--card);border:3px solid var(--plight);border-radius:var(--r);padding:14px 20px;font-size:1rem;font-weight:900;font-family:'Courier New',monospace;cursor:pointer;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh);transition:border-color .15s,transform .1s;letter-spacing:1px}
.user-btn:hover{border-color:var(--primary);transform:translateY(-2px)}
.user-btn:active{transform:scale(.97)}
.user-btn .ustars{background:var(--yellow);border-radius:20px;padding:2px 10px;font-size:.8rem}
.new-user-area{display:flex;gap:8px;width:100%;max-width:340px}
#new-name{flex:1;padding:12px 16px;border:3px solid var(--plight);border-radius:var(--r);font-size:1rem;font-weight:700;font-family:'Courier New',monospace;letter-spacing:1px;color:var(--text);background:var(--card)}
#new-name:focus{outline:none;border-color:var(--primary)}
#add-user-btn{background:var(--primary);color:#fff;border:none;border-radius:var(--r);padding:12px 18px;font-size:1rem;font-weight:900;cursor:pointer}

/* MENU */
#menu{padding:16px 16px 40px;max-width:700px;margin:0 auto;display:none}
.category-title{font-size:.72rem;font-weight:900;letter-spacing:3px;color:var(--soft);margin:24px 0 10px;text-transform:uppercase}
.category-title.gifted{color:var(--purple)}
.category-title.special{color:#b5501b}
.game-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:500px){.game-grid{grid-template-columns:repeat(3,1fr)}}
.game-btn{background:var(--card);border:3px solid transparent;border-radius:var(--r);padding:16px 8px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;box-shadow:var(--sh);transition:transform .15s,box-shadow .15s,border-color .15s;-webkit-tap-highlight-color:transparent}
.game-btn:active{transform:scale(.96)}
.game-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(67,97,238,.18);border-color:var(--primary)}
.game-btn .icon{font-size:2rem}
.game-btn .label{font-size:.68rem;font-weight:900;letter-spacing:1.5px;text-align:center;color:var(--text)}
.game-btn.gifted{border-color:var(--plightbg)}
.game-btn.gifted:hover{border-color:var(--purple)}
.game-btn.gifted .label{color:var(--purple)}
.game-btn.special-btn{border-color:#fde8d8;background:linear-gradient(135deg,#fff8f5,#fff)}
.game-btn.special-btn:hover{border-color:#e07030}
.game-btn.special-btn .label{color:#b5501b}

/* BADGES */
#badges{margin-top:24px;background:var(--ylight);border-radius:var(--r);padding:14px;text-align:center}
#badges h3{font-size:.72rem;letter-spacing:2px;font-weight:900;color:var(--soft);margin-bottom:8px}
.badge-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.badge{width:50px;height:50px;border-radius:50%;border:3px solid #ddd;background:#eee;display:flex;align-items:center;justify-content:center;font-size:1.4rem;filter:grayscale(1);transition:filter .3s,border-color .3s}
.badge.earned{filter:none;border-color:var(--yellow);box-shadow:0 0 0 3px rgba(255,214,10,.3)}

/* RANGLISTE */
#ranking-box{margin-top:16px;background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh)}
#ranking-box h3{font-size:.72rem;letter-spacing:2px;font-weight:900;color:var(--soft);margin-bottom:10px;text-align:center}
.rank-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:12px;margin-bottom:5px;font-family:'Courier New',monospace;font-weight:700;font-size:.85rem}
.rank-row.me{background:var(--plight);border:2px solid var(--primary)}
.rank-medal{font-size:1.2rem;width:28px;text-align:center}
.rank-name{flex:1;letter-spacing:1px}
.rank-stars{background:var(--yellow);border-radius:20px;padding:2px 10px;font-size:.78rem}

/* GAME SCREEN */
#game-screen{display:none;padding:16px;max-width:700px;margin:0 auto}
#back-btn{background:none;border:none;font-size:.95rem;font-weight:900;letter-spacing:1px;color:var(--primary);cursor:pointer;display:flex;align-items:center;gap:6px;padding:4px 0 14px;-webkit-tap-highlight-color:transparent}
#progress-bar-wrap{height:10px;border-radius:10px;background:#dde3ff;margin-bottom:16px;overflow:hidden}
#progress-bar{height:100%;border-radius:10px;background:var(--primary);transition:width .4s ease}
#question-card{background:var(--card);border-radius:var(--r);padding:20px 18px 18px;box-shadow:var(--sh);margin-bottom:14px}
#q-label{font-size:.62rem;letter-spacing:3px;font-weight:900;color:var(--soft);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
#tts-btn{background:var(--plight);border:none;border-radius:30px;padding:5px 12px;cursor:pointer;font-size:.72rem;font-weight:900;color:var(--primary);letter-spacing:1px;display:flex;align-items:center;gap:5px}
#q-text{font-size:1.3rem;font-weight:900;letter-spacing:1px;line-height:1.35;margin-bottom:4px;font-family:'Courier New',monospace;white-space:pre-line}
#q-emoji{font-size:2.6rem;margin:8px 0;display:block;text-align:center}
#clock-display{display:none;justify-content:center;margin:10px 0}

.answer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.ans-wrap{position:relative}
.ans-btn{width:100%;background:var(--plight);border:3px solid transparent;border-radius:14px;padding:13px 34px 13px 10px;font-size:.95rem;font-weight:900;font-family:'Courier New',monospace;letter-spacing:1px;cursor:pointer;text-align:center;transition:background .15s,border-color .15s,transform .1s;-webkit-tap-highlight-color:transparent;color:var(--text)}
.ans-btn:active{transform:scale(.97)}
.ans-btn:hover{border-color:var(--primary);background:#d0d8ff}
.ans-btn.correct{background:var(--glight);border-color:var(--green);color:var(--green)}
.ans-btn.wrong{background:var(--rlight);border-color:var(--red);color:var(--red)}
.ans-btn.disabled{pointer-events:none}
.ans-speak{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.7);border:none;border-radius:50%;width:24px;height:24px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.ans-speak:hover{background:rgba(255,255,255,.95)}

.gifted-game .ans-btn{background:var(--plightbg)}
.gifted-game .ans-btn:hover{border-color:var(--purple);background:#e8d5f0}
.gifted-game #progress-bar{background:var(--purple)}
.test-game #progress-bar{background:#b5501b}
.test-game .ans-btn{background:#fff8f5}
.test-game .ans-btn:hover{border-color:#e07030;background:#fde8d8}

#feedback{min-height:34px;font-size:1rem;font-weight:900;letter-spacing:1px;text-align:center;padding:7px 0;font-family:'Courier New',monospace}
#feedback.ok{color:var(--green)}
#feedback.err{color:var(--red)}

/* RESULT */
#result-screen{display:none;padding:28px 20px;max-width:500px;margin:0 auto;text-align:center}
#result-screen .big-emoji{font-size:4.5rem;margin-bottom:10px}
#result-screen h2{font-size:1.7rem;font-weight:900;letter-spacing:2px;margin-bottom:7px;font-family:'Courier New',monospace}
#result-screen p{color:var(--soft);margin-bottom:20px;font-size:.95rem;font-family:'Courier New',monospace}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.result-btns button{padding:13px 22px;border:none;border-radius:14px;font-size:.88rem;font-weight:900;letter-spacing:1.5px;cursor:pointer;transition:transform .1s;font-family:'Courier New',monospace}
.result-btns button:active{transform:scale(.97)}
#btn-again{background:var(--primary);color:#fff}
#btn-menu{background:var(--yellow);color:var(--text)}
</style>
</head>
<body>

<div id="header">
  <h1>⭐ LERN-APP</h1>
  <div id="header-right">
    <div id="user-pill" onclick="showLogin()">👤 —</div>
    <div id="star-display">⭐ <span id="total-stars">0</span></div>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div style="font-size:3rem;margin-bottom:12px">👤</div>
  <h2>WER SPIELT?</h2>
  <p>Wähle deinen Namen oder füge einen neuen hinzu!</p>
  <div class="user-list" id="user-list"></div>
  <div class="new-user-area">
    <input id="new-name" placeholder="NEUER NAME..." maxlength="12" autocomplete="off"/>
    <button id="add-user-btn" onclick="addUser()">＋</button>
  </div>
</div>

<!-- MENU -->
<div id="menu">
  <div class="category-title">📖 SPRACHE &amp; LESEN</div>
  <div class="game-grid">
    <button class="game-btn" onclick="startGame('anlaute')"><div class="icon">🔤</div><div class="label">ANLAUTE</div></button>
    <button class="game-btn" onclick="startGame('reimen')"><div class="icon">🎵</div><div class="label">REIMEN</div></button>
    <button class="game-btn" onclick="startGame('silben')"><div class="icon">✂️</div><div class="label">SILBEN</div></button>
    <button class="game-btn" onclick="startGame('woerter')"><div class="icon">📝</div><div class="label">WÖRTER</div></button>
    <button class="game-btn" onclick="startGame('wortbau')"><div class="icon">🧩</div><div class="label">WORTBAU</div></button>
    <button class="game-btn" onclick="startGame('englisch')"><div class="icon">🇬🇧</div><div class="label">ENGLISCH</div></button>
  </div>
  <div class="category-title">🔢 MATHE &amp; LOGIK</div>
  <div class="game-grid">
    <button class="game-btn" onclick="startGame('zahlen')"><div class="icon">🔢</div><div class="label">ZAHLEN</div></button>
    <button class="game-btn" onclick="startGame('rechnen')"><div class="icon">➕</div><div class="label">RECHNEN</div></button>
    <button class="game-btn" onclick="startGame('muster')"><div class="icon">🔷</div><div class="label">MUSTER</div></button>
    <button class="game-btn" onclick="startGame('formen')"><div class="icon">📐</div><div class="label">FORMEN</div></button>
    <button class="game-btn" onclick="startGame('geld')"><div class="icon">💰</div><div class="label">GELD</div></button>
    <button class="game-btn" onclick="startGame('uhrzeit')"><div class="icon">🕐</div><div class="label">UHRZEIT</div></button>
  </div>
  <div class="category-title">🌍 WELT &amp; WISSEN</div>
  <div class="game-grid">
    <button class="game-btn" onclick="startGame('flaggen')"><div class="icon">🏳️</div><div class="label">FLAGGEN</div></button>
    <button class="game-btn" onclick="startGame('autos')"><div class="icon">🚗</div><div class="label">AUTOS</div></button>
    <button class="game-btn" onclick="startGame('tiere')"><div class="icon">🦁</div><div class="label">TIERE</div></button>
  </div>
  <div class="category-title gifted">🌟 HOCHBEGABT</div>
  <div class="game-grid">
    <button class="game-btn gifted" onclick="startGame('logik')"><div class="icon">🧠</div><div class="label">LOGIK</div></button>
    <button class="game-btn gifted" onclick="startGame('mathe100')"><div class="icon">💯</div><div class="label">MATHE 100</div></button>
    <button class="game-btn gifted" onclick="startGame('analogien')"><div class="icon">🔗</div><div class="label">ANALOGIEN</div></button>
    <button class="game-btn gifted" onclick="startGame('raetsel')"><div class="icon">🎭</div><div class="label">RÄTSEL</div></button>
    <button class="game-btn gifted" onclick="startGame('folgen')"><div class="icon">📈</div><div class="label">ZAHLENFOLGEN</div></button>
    <button class="game-btn gifted" onclick="startGame('raeumlich')"><div class="icon">🔲</div><div class="label">RÄUMLICH</div></button>
  </div>
  <div class="category-title special">🏆 GESAMTTEST</div>
  <div class="game-grid" style="grid-template-columns:1fr">
    <button class="game-btn special-btn" onclick="startGame('gesamttest')" style="flex-direction:row;gap:14px;padding:18px 20px">
      <div class="icon">📝</div>
      <div style="text-align:left">
        <div class="label" style="font-size:.8rem;margin-bottom:3px">GESAMTTEST</div>
        <div style="font-size:.65rem;color:var(--soft);letter-spacing:.5px">10 ZUFALLSFRAGEN AUS ALLEN BEREICHEN</div>
      </div>
    </button>
  </div>
  <div id="badges">
    <h3>MEINE ABZEICHEN</h3>
    <div class="badge-row">
      <div class="badge" id="badge-1" title="5 Sterne">🥉</div>
      <div class="badge" id="badge-2" title="15 Sterne">🥈</div>
      <div class="badge" id="badge-3" title="30 Sterne">🥇</div>
      <div class="badge" id="badge-4" title="60 Sterne">🏆</div>
      <div class="badge" id="badge-4g" title="Hochbegabt-Quiz">🌟</div>
    </div>
  </div>
  <div id="ranking-box">
    <h3>🏆 RANGLISTE</h3>
    <div id="ranking-list"></div>
  </div>
</div>

<!-- GAME -->
<div id="game-screen">
  <button id="back-btn" onclick="goMenu()">← ZURÜCK</button>
  <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
  <div id="question-card">
    <div id="q-label">
      <span id="q-counter">FRAGE 1 / 6</span>
      <button id="tts-btn" onclick="speakQuestion()">🔊 VORLESEN</button>
    </div>
    <div id="clock-display"><canvas id="clock-canvas" width="160" height="160"></canvas></div>
    <div id="q-emoji"></div>
    <div id="q-text"></div>
    <div class="answer-grid" id="answer-grid"></div>
  </div>
  <div id="feedback"></div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <div class="big-emoji" id="result-emoji">🎉</div>
  <h2 id="result-title">SUPER!</h2>
  <p id="result-text"></p>
  <div class="result-btns">
    <button id="btn-again" onclick="restartGame()">NOCHMAL ▶</button>
    <button id="btn-menu" onclick="goMenu()">MENÜ 🏠</button>
  </div>
</div>

<script>
/* ── BENUTZER / SPEICHER ── */
function loadUsers(){try{return JSON.parse(localStorage.getItem('lernapp_users')||'[]')}catch{return[]}}
function saveUsers(u){localStorage.setItem('lernapp_users',JSON.stringify(u))}
let users=loadUsers();
let currentUser=null;

function showLogin(){
  document.getElementById('menu').style.display='none';
  document.getElementById('game-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  renderUserList();
}

function renderUserList(){
  const ul=document.getElementById('user-list');
  ul.innerHTML='';
  const sorted=[...users].sort((a,b)=>b.stars-a.stars);
  sorted.forEach(u=>{
    const btn=document.createElement('button');
    btn.className='user-btn';
    btn.innerHTML=`<span>👤 ${u.name}</span><span class="ustars">⭐ ${u.stars}</span>`;
    btn.onclick=()=>selectUser(u.name);
    ul.appendChild(btn);
  });
  if(users.length===0){
    ul.innerHTML='<p style="color:var(--soft);font-size:.85rem">Noch keine Benutzer — füge einen hinzu!</p>';
  }
}

function addUser(){
  const inp=document.getElementById('new-name');
  const name=inp.value.trim().toUpperCase();
  if(!name||name.length<1)return;
  if(users.find(u=>u.name===name)){selectUser(name);inp.value='';return;}
  users.push({name,stars:0,giftedDone:0});
  saveUsers(users);
  inp.value='';
  selectUser(name);
}
document.getElementById('new-name').addEventListener('keydown',e=>{if(e.key==='Enter')addUser();});

function selectUser(name){
  currentUser=users.find(u=>u.name===name);
  if(!currentUser)return;
  totalStars=currentUser.stars;
  giftedCompleted=currentUser.giftedDone||0;
  document.getElementById('total-stars').textContent=totalStars;
  document.getElementById('user-pill').textContent='👤 '+currentUser.name;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('menu').style.display='block';
  updateBadges();
  renderRanking();
}

function saveCurrentUser(){
  if(!currentUser)return;
  const idx=users.findIndex(u=>u.name===currentUser.name);
  if(idx>=0){users[idx].stars=totalStars;users[idx].giftedDone=giftedCompleted;}
  saveUsers(users);
}

function renderRanking(){
  const el=document.getElementById('ranking-list');
  const sorted=[...users].sort((a,b)=>b.stars-a.stars);
  const medals=['🥇','🥈','🥉'];
  el.innerHTML=sorted.map((u,i)=>`
    <div class="rank-row${currentUser&&u.name===currentUser.name?' me':''}">
      <span class="rank-medal">${medals[i]||'🌟'}</span>
      <span class="rank-name">${u.name}</span>
      <span class="rank-stars">⭐ ${u.stars}</span>
    </div>`).join('');
}

/* ── SPIELDATEN ── */
const CLOCK_TIMES=[
  {h:3,m:0,ans:'3:00 UHR',choices:['3:00 UHR','6:00 UHR','9:00 UHR','12:00 UHR']},
  {h:6,m:0,ans:'6:00 UHR',choices:['6:00 UHR','3:00 UHR','9:00 UHR','12:00 UHR']},
  {h:9,m:0,ans:'9:00 UHR',choices:['9:00 UHR','3:00 UHR','6:00 UHR','12:00 UHR']},
  {h:12,m:0,ans:'12:00 UHR',choices:['12:00 UHR','6:00 UHR','3:00 UHR','9:00 UHR']},
  {h:1,m:30,ans:'1:30 UHR',choices:['1:30 UHR','2:00 UHR','1:00 UHR','2:30 UHR']},
  {h:4,m:30,ans:'4:30 UHR',choices:['4:30 UHR','5:00 UHR','4:00 UHR','5:30 UHR']},
  {h:7,m:0,ans:'7:00 UHR',choices:['7:00 UHR','8:00 UHR','6:00 UHR','7:30 UHR']},
  {h:10,m:30,ans:'10:30 UHR',choices:['10:30 UHR','10:00 UHR','11:00 UHR','11:30 UHR']},
  {h:2,m:0,ans:'2:00 UHR',choices:['2:00 UHR','3:00 UHR','1:00 UHR','2:30 UHR']},
  {h:8,m:0,ans:'8:00 UHR',choices:['8:00 UHR','9:00 UHR','7:00 UHR','8:30 UHR']},
  {h:5,m:30,ans:'5:30 UHR',choices:['5:30 UHR','5:00 UHR','6:00 UHR','6:30 UHR']},
  {h:11,m:0,ans:'11:00 UHR',choices:['11:00 UHR','12:00 UHR','10:00 UHR','11:30 UHR']},
];

function clockQ(t){return{q:'WIE VIEL UHR IST ES?\n(SCHAU AUF DIE UHR)',emoji:'',clock:{h:t.h,m:t.m},answer:t.ans,choices:t.choices};}

const GAMES={
  anlaute:{title:'ANLAUTE',questions:[
    {q:'WAS IST DER ERSTE BUCHSTABE?',emoji:'🦁',answer:'L',choices:['L','T','B','M']},
    {q:'WAS IST DER ERSTE BUCHSTABE?',emoji:'🐘',answer:'E',choices:['E','A','O','U']},
    {q:'WAS IST DER ERSTE BUCHSTABE?',emoji:'🍎',answer:'A',choices:['A','O','E','I']},
    {q:'WAS IST DER ERSTE BUCHSTABE?',emoji:'🐧',answer:'P',choices:['P','B','D','F']},
    {q:'WAS IST DER ERSTE BUCHSTABE?',emoji:'🚀',answer:'R',choices:['R','S','T','N']},
    {q:'WAS IST DER ERSTE BUCHSTABE?',emoji:'🌺',answer:'B',choices:['B','D','P','G']},
    {q:'WAS IST DER ERSTE BUCHSTABE?',emoji:'🐸',answer:'F',choices:['F','V','P','B']},
    {q:'WAS IST DER ERSTE BUCHSTABE?',emoji:'🌙',answer:'M',choices:['M','N','W','B']},
    {q:'WAS IST DER ERSTE BUCHSTABE?',emoji:'🐢',answer:'S',choices:['S','Z','T','C']},
    {q:'WAS IST DER ERSTE BUCHSTABE?',emoji:'🎈',answer:'B',choices:['B','P','D','G']},
    {q:'WAS IST DER ERSTE BUCHSTABE?',emoji:'🦊',answer:'F',choices:['F','V','W','B']},

/* ── GESAMTTEST GENERIEREN ── */
function buildGesamttest(){
  const allGames=Object.keys(GAMES).filter(k=>k!=='gesamttest'&&k!=='uhrzeit');
  // Nimm aus jedem Bereich ein paar Fragen + Uhrzeit extra
  let pool=[];
  allGames.forEach(k=>{
    const qs=GAMES[k].questions;
    pool.push({...qs[Math.floor(Math.random()*qs.length)],_from:k});
  });
  // Uhrzeit: 2 Ziffernblatt-Fragen
  const clockQs=CLOCK_TIMES.sort(()=>Math.random()-.5).slice(0,2).map(t=>({...clockQ(t),_from:'uhrzeit'}));
  pool=[...pool,...clockQs];
  // Shuffle und 10 nehmen
  pool.sort(()=>Math.random()-.5);
  return pool.slice(0,10);
}

let totalStars=0,giftedCompleted=0,currentGame=null,currentQ=0;

/* ── TTS ── */
let _bestVoice=null;
function loadVoice(){
  if(_bestVoice)return;
  const voices=speechSynthesis.getVoices();
  const priority=['Google Deutsch','Flo (German (Germany))','Sandy (German (Germany))','Reed (German (Germany))'];
  for(const name of priority){const v=voices.find(v=>v.name===name);if(v){_bestVoice=v;break;}}
  if(!_bestVoice)_bestVoice=voices.find(v=>v.lang&&v.lang.startsWith('de'))||null;
}
if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=loadVoice;
setTimeout(loadVoice,500);

function speak(text){
  if(!window.speechSynthesis)return;
  loadVoice();
  speechSynthesis.cancel();
  const noEmoji=text.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{FE00}-\u{FE0F}]/gu,'');
  const cleaned=noEmoji.replace(/\n/g,', ').toLowerCase().replace(/= \?/g,'gleich').replace(/\s+/g,' ').trim();
  const u=new SpeechSynthesisUtterance(cleaned);
  if(_bestVoice)u.voice=_bestVoice;
  u.lang='de-DE';u.rate=0.92;u.pitch=1.05;u.volume=1.0;
  speechSynthesis.speak(u);
}
function speakQuestion(){speak(currentQuestions[currentQ].q);}
function speakChoice(text,e){e.stopPropagation();speak(text);}

/* ── ZIFFERNBLATT ── */
function drawClock(h,m){
  const canvas=document.getElementById('clock-canvas');
  const ctx=canvas.getContext('2d');
  const cx=80,cy=80,r=74;
  ctx.clearRect(0,0,160,160);
  // Hintergrund
  ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);
  ctx.fillStyle='#fff';ctx.fill();
  ctx.strokeStyle='#4361ee';ctx.lineWidth=3;ctx.stroke();
  // Zahlen
  ctx.fillStyle='#1a1a2e';ctx.font='bold 13px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=1;i<=12;i++){
    const ang=(i*30-90)*Math.PI/180;
    ctx.fillText(i,cx+58*Math.cos(ang),cy+58*Math.sin(ang));
  }
  // Stundenzeiger
  const hAng=((h%12)+(m/60))*30-90;
  ctx.beginPath();ctx.moveTo(cx,cy);
  ctx.lineTo(cx+40*Math.cos(hAng*Math.PI/180),cy+40*Math.sin(hAng*Math.PI/180));
  ctx.strokeStyle='#1a1a2e';ctx.lineWidth=5;ctx.lineCap='round';ctx.stroke();
  // Minutenzeiger
  const mAng=(m*6-90)*Math.PI/180;
  ctx.beginPath();ctx.moveTo(cx,cy);
  ctx.lineTo(cx+60*Math.cos(mAng),cy+60*Math.sin(mAng));
  ctx.strokeStyle='#4361ee';ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();
  // Mittelpunkt
  ctx.beginPath();ctx.arc(cx,cy,5,0,2*Math.PI);
  ctx.fillStyle='#e63946';ctx.fill();
}

/* ── NAVIGATION ── */
function goMenu(){
  speechSynthesis.cancel&&speechSynthesis.cancel();
  document.getElementById('menu').style.display='block';
  document.getElementById('game-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  updateBadges();renderRanking();
}

function startGame(id){
  currentGame=id;
  const g=GAMES[id];
  if(id==='gesamttest'){
    currentQuestions=buildGesamttest();
  } else {
    currentQuestions=[...g.questions].sort(()=>Math.random()-.5).slice(0,6);
  }
  currentQ=0;sessionStars=0;answered=false;
  document.getElementById('menu').style.display='none';
  document.getElementById('result-screen').style.display='none';
  const gs=document.getElementById('game-screen');
  gs.style.display='block';
  gs.className=g.gifted?'gifted-game':g.isTest?'test-game':'';
  renderQuestion();
}
function restartGame(){startGame(currentGame);}

/* ── FRAGE RENDERN ── */
function renderQuestion(){
  answered=false;
  const q=currentQuestions[currentQ];
  const total=currentQuestions.length;
  document.getElementById('q-counter').textContent=`FRAGE ${currentQ+1} / ${total}`;
  document.getElementById('progress-bar').style.width=`${(currentQ/total)*100}%`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='';

  // Ziffernblatt oder Emoji
  const clockDiv=document.getElementById('clock-display');
  const emojiDiv=document.getElementById('q-emoji');
  if(q.clock){
    clockDiv.style.display='flex';
    emojiDiv.style.display='none';
    emojiDiv.textContent='';
    drawClock(q.clock.h,q.clock.m);
  } else {
    clockDiv.style.display='none';
    emojiDiv.style.display='block';
    emojiDiv.textContent=q.emoji||'';
  }

  const grid=document.getElementById('answer-grid');
  grid.innerHTML='';
  [...q.choices].sort(()=>Math.random()-.5).forEach(c=>{
    const wrap=document.createElement('div');wrap.className='ans-wrap';
    const btn=document.createElement('button');btn.className='ans-btn';btn.textContent=c;
    btn.onclick=()=>checkAnswer(btn,c,q.answer);
    const spk=document.createElement('button');spk.className='ans-speak';spk.textContent='🔊';
    spk.onclick=(e)=>speakChoice(c,e);
    wrap.appendChild(btn);wrap.appendChild(spk);
    grid.appendChild(wrap);
  });
}

function checkAnswer(btn,chosen,correct){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.ans-btn').forEach(b=>{
    b.classList.add('disabled');
    if(b.textContent===correct)b.classList.add('correct');
  });
  const fb=document.getElementById('feedback');
  if(chosen===correct){
    btn.classList.add('correct');
    fb.textContent='✅ SUPER! RICHTIG!';fb.className='ok';
    speak('Super! Richtig!');
    sessionStars++;totalStars++;
    document.getElementById('total-stars').textContent=totalStars;
    saveCurrentUser();
  } else {
    btn.classList.add('wrong');
    fb.textContent=`❌ FAST! RICHTIG WAR: ${correct}`;fb.className='err';
    speak('Fast! Die richtige Antwort war: '+correct);
  }
  setTimeout(()=>{currentQ++;currentQ<currentQuestions.length?renderQuestion():showResult();},1800);
}

/* ── ERGEBNIS ── */
function showResult(){
  const total=currentQuestions.length,pct=sessionStars/total;
  if(GAMES[currentGame].gifted)giftedCompleted++;
  saveCurrentUser();
  document.getElementById('game-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  let emoji,title,msg;
  if(pct===1){emoji='🏆';title='PERFEKT!';msg=`ALLE ${total} RICHTIG! UNGLAUBLICH!`;}
  else if(pct>=.67){emoji='🎉';title='SUPER!';msg=`${sessionStars} VON ${total} RICHTIG! TOLL GEMACHT!`;}
  else if(pct>=.33){emoji='👍';title='GUT!';msg=`${sessionStars} VON ${total} RICHTIG! WEITER ÜBEN!`;}
  else{emoji='💪';title='WEITER!';msg=`${sessionStars} VON ${total} RICHTIG! DU SCHAFFST DAS!`;}
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-text').textContent=msg;
  speak(title+'! '+msg);
  updateBadges();renderRanking();
}

/* ── BADGES ── */
function updateBadges(){
  if(totalStars>=5)document.getElementById('badge-1').classList.add('earned');
  if(totalStars>=15)document.getElementById('badge-2').classList.add('earned');
  if(totalStars>=30)document.getElementById('badge-3').classList.add('earned');
  if(totalStars>=60)document.getElementById('badge-4').classList.add('earned');
  if(giftedCompleted>=1)document.getElementById('badge-4g').classList.add('earned');
}

/* ── START ── */
showLogin();
</script>
